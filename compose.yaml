services:
  send-db:
    image: timescale/timescaledb:latest-pg16
    container_name: send-db
    environment:
      POSTGRES_DB: send
      POSTGRES_USER: send_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - send_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U send_user -d send" ]
      interval: 10s
      timeout: 5s
      retries: 10

  send-back:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      OCAML_WORKER_COMMAND: /app/worker
      SPRING_DATASOURCE_URL: jdbc:postgresql://send-db:5432/send
      SPRING_DATASOURCE_USERNAME: send_user
      SPRING_DATASOURCE_PASSWORD: change_me
      SERVER_PORT: "8080"
    ports:
      - "9119:8080"
    depends_on:
      send-db:
        condition: service_healthy

  send-front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - send-back

volumes:
  send_db_data:
