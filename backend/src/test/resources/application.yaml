spring:
  datasource:
    url: jdbc:h2:mem:send;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

market-data:
  bootstrap-tracked-symbols: []
  scheduler:
    prices:
      enabled: false
      cron: "0 0 18 * * MON-FRI"
      zone: "America/New_York"
    fundamentals:
      enabled: false
      cron: "0 0 6 * * MON-FRI"
      zone: "America/New_York"
